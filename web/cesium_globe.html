<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FabricOS Globe</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
    />
    <style>
      :root {
        --bg-1: #030712;
        --bg-2: #06142a;
        --bg-3: #081f3c;
        --panel-bg: linear-gradient(
          145deg,
          rgba(8, 22, 43, 0.78),
          rgba(5, 15, 30, 0.62)
        );
        --panel-border: rgba(96, 165, 250, 0.28);
        --text: #dbeafe;
        --muted: #9db4d3;
        --accent: #67e8f9;
      }

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 10%, rgba(56, 189, 248, 0.18), transparent 32%),
          radial-gradient(circle at 85% 85%, rgba(59, 130, 246, 0.12), transparent 28%),
          linear-gradient(145deg, var(--bg-3), var(--bg-2) 42%, var(--bg-1) 78%);
      }

      #hud {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 3;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        color: var(--text);
        font-family: Manrope, sans-serif;
        backdrop-filter: blur(8px);
        box-shadow:
          0 16px 36px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(148, 163, 184, 0.08);
      }

      #hudTitle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: Syne, sans-serif;
        font-size: 15px;
        letter-spacing: 0.25px;
      }

      #hudBadge {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 12px rgba(103, 232, 249, 0.95);
        animation: pulse 1.7s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.35);
          opacity: 0.7;
        }
      }

      #countLine {
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      #legend {
        margin-top: 9px;
        font-size: 12px;
        opacity: 0.96;
      }

      #legend span {
        margin-right: 12px;
        white-space: nowrap;
      }

      .dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        margin-right: 5px;
      }

      .dot-running {
        background: #22c55e;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.7);
      }

      .dot-warning {
        background: #f59e0b;
        box-shadow: 0 0 10px rgba(245, 158, 11, 0.7);
      }

      .dot-stopped {
        background: #ef4444;
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.7);
      }

      #statusCard {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 3;
        min-width: 180px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(125, 211, 252, 0.22);
        background: linear-gradient(
          170deg,
          rgba(8, 23, 43, 0.8),
          rgba(5, 15, 30, 0.58)
        );
        color: #dbeafe;
        font-family: Manrope, sans-serif;
        font-size: 12px;
        backdrop-filter: blur(10px);
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.42);
      }

      #statusLabel {
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-size: 11px;
        color: #7dd3fc;
      }

      #statusTime {
        margin-top: 4px;
        font-size: 13px;
        color: #bfdbfe;
      }

      #emptyState {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        color: #dbeafe;
        font-family: Manrope, sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 24px;
        pointer-events: none;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <div id="hud">
      <div id="hudTitle">
        <span id="hudBadge"></span>
        <strong>FabricOS Global Network</strong>
      </div>
      <div id="countLine">0 machines tracked</div>
      <div id="legend">
        <span><i class="dot dot-running"></i>Running</span>
        <span><i class="dot dot-warning"></i>Warning</span>
        <span><i class="dot dot-stopped"></i>Stopped</span>
      </div>
    </div>
    <div id="statusCard">
      <div id="statusLabel">Live map</div>
      <div id="statusTime">Rendering global machine layer</div>
    </div>
    <div id="emptyState">No machine geolocation data available yet.</div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <script>
      function escapeHtml(text) {
        return String(text ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function toNumber(value) {
        if (typeof value === 'number') return value;
        const parsed = Number.parseFloat(value);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function parseMarkers() {
        const params = new URLSearchParams(window.location.search);
        const raw = params.get('markers');
        if (!raw) return [];
        try {
          const parsed = JSON.parse(decodeURIComponent(raw));
          if (!Array.isArray(parsed)) return [];
          return parsed
            .map((item) => ({
              name: item?.name || 'Machine',
              city: item?.city || '',
              country: item?.country || '',
              address: item?.address || '',
              status: (item?.status || 'running').toLowerCase(),
              latitude: toNumber(item?.latitude),
              longitude: toNumber(item?.longitude),
            }))
            .filter((item) => item.latitude !== null && item.longitude !== null);
        } catch (_) {
          return [];
        }
      }

      function statusColor(status) {
        if (status === 'stopped') return Cesium.Color.fromCssColorString('#ef4444');
        if (status === 'warning') return Cesium.Color.fromCssColorString('#f59e0b');
        return Cesium.Color.fromCssColorString('#22c55e');
      }

      function statusGlowColor(status) {
        if (status === 'stopped') return Cesium.Color.fromCssColorString('#fda4af');
        if (status === 'warning') return Cesium.Color.fromCssColorString('#fcd34d');
        return Cesium.Color.fromCssColorString('#86efac');
      }

      const markers = parseMarkers();
      const viewer = new Cesium.Viewer('cesiumContainer', {
        imageryProvider: new Cesium.OpenStreetMapImageryProvider({
          url: 'https://tile.openstreetmap.org/',
        }),
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        baseLayerPicker: false,
        navigationHelpButton: false,
        animation: false,
        timeline: false,
        fullscreenButton: false,
        infoBox: true,
        selectionIndicator: true,
        shouldAnimate: true,
      });

      viewer.scene.globe.enableLighting = true;
      viewer.scene.skyAtmosphere.show = true;
      viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#020712');
      viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#041526');
      viewer.scene.fog.enabled = true;
      viewer.scene.globe.atmosphereHueShift = -0.06;
      viewer.scene.globe.atmosphereBrightnessShift = 0.12;
      viewer.scene.globe.atmosphereSaturationShift = 0.15;
      viewer.scene.skyBox.show = true;
      viewer._cesiumWidget._creditContainer.style.display = 'none';

      const now = new Date();
      document.getElementById('statusTime').textContent =
        `Updated ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      document.getElementById('countLine').textContent =
        `${markers.length} machine${markers.length === 1 ? '' : 's'} tracked`;

      if (!markers.length) {
        document.getElementById('emptyState').style.display = 'flex';
      }

      markers.forEach((marker) => {
        const location = [marker.city, marker.country].filter(Boolean).join(', ');
        const color = statusColor(marker.status);
        const glow = statusGlowColor(marker.status);
        viewer.entities.add({
          name: marker.name,
          position: Cesium.Cartesian3.fromDegrees(marker.longitude, marker.latitude),
          point: {
            pixelSize: 12,
            color,
            outlineColor: Cesium.Color.fromCssColorString('#020817'),
            outlineWidth: 3,
          },
          ellipse: {
            semiMinorAxis: 34000,
            semiMajorAxis: 34000,
            material: glow.withAlpha(0.18),
            outline: false,
          },
          label: {
            text: marker.name,
            showBackground: true,
            backgroundColor: Cesium.Color.fromCssColorString('#0a1d35').withAlpha(0.72),
            fillColor: Cesium.Color.fromCssColorString('#e2e8f0'),
            font: '600 12px Manrope',
            pixelOffset: new Cesium.Cartesian2(0, -20),
            horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            outlineColor: Cesium.Color.fromCssColorString('#020817'),
            outlineWidth: 1,
          },
          description:
            `<b>${escapeHtml(marker.name)}</b><br/>` +
            `${escapeHtml(location)}<br/>` +
            `${escapeHtml(marker.address)}<br/>` +
            `Status: <b>${escapeHtml(marker.status)}</b>`,
        });
      });

      if (markers.length) {
        viewer.flyTo(viewer.entities, { duration: 1.8, offset: new Cesium.HeadingPitchRange(0, -0.55, 0) });
      } else {
        viewer.camera.flyHome(0);
      }
    </script>
  </body>
</html>
